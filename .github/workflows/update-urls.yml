name: Update External URLs

on:
  # 每周一凌晨 2:00 (UTC) 运行 = 北京时间上午 10:00
  schedule:
    - cron: '0 2 * * 1'

  # 允许手动触发
  workflow_dispatch:

  # 当脚本被修改时也触发
  push:
    paths:
      - 'scripts/fetch_urls.sh'
      - '.github/workflows/update-urls.yml'
    branches:
      - main

jobs:
  update-urls:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Fetch and update URLs
        run: bash scripts/fetch_urls.sh

      - name: Check for changes
        id: git-check
        run: |
          git diff --exit-code urls/external_urls.txt || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit and push if changed
        if: steps.git-check.outputs.changed == 'true'
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add urls/external_urls.txt
          git commit -m "chore: update external URLs from llxhq

🤖 Generated with [Claude Code](https://claude.com/claude-code)

Co-Authored-By: Claude <noreply@anthropic.com>"
          git push

      - name: Create summary
        if: always()
        run: |
          echo "## URL Update Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -f urls/external_urls.txt ]; then
            URL_COUNT=$(grep -v '^#' urls/external_urls.txt | grep -v '^$' | wc -l)
            echo "✅ Successfully fetched **${URL_COUNT}** URLs" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "### Sample URLs:" >> $GITHUB_STEP_SUMMARY
            grep -v '^#' urls/external_urls.txt | grep -v '^$' | head -5 >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ Failed to fetch URLs" >> $GITHUB_STEP_SUMMARY
          fi
